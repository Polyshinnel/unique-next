services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: uniqset2_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/nginx/default.conf:/etc/nginx/http.d/default.conf
    ports:
      - "${APP_HTTP_PORT:-28080}:80"
    environment:
      - APP_DEBUG=true
      - BACKEND_URL=http://127.0.0.1
      - NEXT_PUBLIC_API_URL=/api
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - WWWUSER=${UID:-1000}
      - WWWGROUP=${GID:-1000}
    networks:
      - uniqset2_network
    depends_on:
      - db
      - redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: uniqset2_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    environment:
      - APP_DEBUG=true
      - DB_HOST=mysql
      - REDIS_HOST=redis
    networks:
      - uniqset2_network
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.4
    container_name: uniqset2_db
    restart: unless-stopped
    command: ["--defaults-file=/etc/mysql/conf.d/my.cnf"]
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-uniqset2}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-uniqset2}
    ports:
      - "${MYSQL_HOST_PORT:-23306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      uniqset2_network:
        aliases:
          - mysql

  redis:
    image: redis:7-alpine
    container_name: uniqset2_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-26379}:6379"
    volumes:
      - redis_data:/data
    networks:
      uniqset2_network:
        aliases:
          - redis
          - uniqset2-redis

volumes:
  db_data:
  redis_data:

networks:
  uniqset2_network:
    driver: bridge
